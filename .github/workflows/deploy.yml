name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================
  # Build & Test Contracts
  # ==========================================
  contracts:
    name: Build Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('contracts/**/Cargo.lock') }}

      - name: Run Tests
        run: cargo test --workspace --features testutils

      - name: Build WASM (Release)
        run: |
          cargo build --release --target wasm32-unknown-unknown -p edufundx_reputation
          cargo build --release --target wasm32-unknown-unknown -p edufundx_core

      - name: Upload WASM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 30

  # ==========================================
  # Build & Deploy Frontend
  # ==========================================
  frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: contracts
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: ${{ vars.NEXT_PUBLIC_STELLAR_NETWORK || 'testnet' }}
          NEXT_PUBLIC_SOROBAN_RPC_URL: ${{ vars.NEXT_PUBLIC_SOROBAN_RPC_URL || 'https://soroban-testnet.stellar.org' }}
          NEXT_PUBLIC_HORIZON_URL: ${{ vars.NEXT_PUBLIC_HORIZON_URL || 'https://horizon-testnet.stellar.org' }}
          NEXT_PUBLIC_STELLAR_EXPLORER_URL: ${{ vars.NEXT_PUBLIC_STELLAR_EXPLORER_URL || 'https://stellar.expert/explorer/testnet' }}
          NEXT_PUBLIC_CORE_CONTRACT_ID: ${{ vars.NEXT_PUBLIC_CORE_CONTRACT_ID }}
          NEXT_PUBLIC_REPUTATION_CONTRACT_ID: ${{ vars.NEXT_PUBLIC_REPUTATION_CONTRACT_ID }}
          NEXT_PUBLIC_NATIVE_TOKEN_CONTRACT_ID: ${{ vars.NEXT_PUBLIC_NATIVE_TOKEN_CONTRACT_ID }}
          NEXT_PUBLIC_PLATFORM_FEE_BPS: ${{ vars.NEXT_PUBLIC_PLATFORM_FEE_BPS || '250' }}
          NEXT_PUBLIC_ENABLE_LOGGING: 'true'

      # Uncomment and configure for your deployment target:
      # Option 1: Vercel
      # - name: Deploy to Vercel
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     working-directory: frontend

      # Option 2: Upload as artifact for manual deployment
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 30

  # ==========================================
  # Deploy Contracts to Testnet (Manual Trigger)
  # ==========================================
  deploy-contracts:
    name: Deploy Contracts to Testnet
    runs-on: ubuntu-latest
    needs: contracts
    if: github.event_name == 'workflow_dispatch'
    environment: testnet
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WASM Artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-wasm
          path: ./wasm/

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Deploy Reputation Contract
        run: |
          echo "Deploying edufundx_reputation..."
          stellar contract deploy \
            --wasm ./wasm/edufundx_reputation.wasm \
            --source ${{ secrets.STELLAR_DEPLOYER_SECRET }} \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" \
            > reputation_contract_id.txt
          echo "Reputation Contract ID: $(cat reputation_contract_id.txt)"

      - name: Deploy Core Contract
        run: |
          echo "Deploying edufundx_core..."
          stellar contract deploy \
            --wasm ./wasm/edufundx_core.wasm \
            --source ${{ secrets.STELLAR_DEPLOYER_SECRET }} \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" \
            > core_contract_id.txt
          echo "Core Contract ID: $(cat core_contract_id.txt)"

      - name: Output Contract IDs
        run: |
          echo "::notice::Reputation Contract: $(cat reputation_contract_id.txt)"
          echo "::notice::Core Contract: $(cat core_contract_id.txt)"
